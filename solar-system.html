<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Solar System Engine</title>
<meta name="description" content="Interactive 3D Solar System simulation with real physics, N-body gravitation, and stunning visuals">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{overflow:hidden;background:#050510;font-family:'Inter',sans-serif;color:#e0e6f0;user-select:none}
canvas{display:block}
#ui-overlay{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:10}
#ui-overlay>*{pointer-events:auto}
.glass{background:rgba(10,15,30,0.75);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:1px solid rgba(100,140,255,0.15);border-radius:12px;box-shadow:0 8px 32px rgba(0,0,0,0.4)}
#top-bar{position:absolute;top:16px;left:50%;transform:translateX(-50%);display:flex;align-items:center;gap:16px;padding:10px 24px}
#top-bar h1{font-size:14px;font-weight:600;letter-spacing:2px;text-transform:uppercase;background:linear-gradient(135deg,#60a5fa,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
#sim-date{font-family:'JetBrains Mono',monospace;font-size:12px;color:#94a3b8}
#controls-panel{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);padding:16px 28px;display:flex;align-items:center;gap:24px;flex-wrap:wrap;justify-content:center}
#controls-panel label{font-size:11px;font-weight:500;letter-spacing:1px;text-transform:uppercase;color:#94a3b8}
#controls-panel .ctrl-group{display:flex;align-items:center;gap:10px}
input[type=range]{-webkit-appearance:none;width:180px;height:4px;background:linear-gradient(90deg,#1e3a5f,#3b82f6);border-radius:2px;outline:none;cursor:pointer}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;background:radial-gradient(circle,#60a5fa,#2563eb);border-radius:50%;box-shadow:0 0 10px rgba(59,130,246,0.5);cursor:pointer}
#time-val{font-family:'JetBrains Mono',monospace;font-size:13px;color:#60a5fa;min-width:90px}
.btn{padding:6px 16px;border:1px solid rgba(100,140,255,0.25);border-radius:8px;background:rgba(30,58,95,0.4);color:#93c5fd;font-size:11px;font-weight:500;letter-spacing:1px;text-transform:uppercase;cursor:pointer;transition:all .2s}
.btn:hover{background:rgba(59,130,246,0.3);border-color:rgba(100,140,255,0.5);box-shadow:0 0 15px rgba(59,130,246,0.2)}
.btn.active{background:rgba(59,130,246,0.4);color:#fff;border-color:#3b82f6}
#planet-nav{position:absolute;right:16px;top:50%;transform:translateY(-50%);padding:10px 6px;display:flex;flex-direction:column;gap:4px}
.nav-btn{width:36px;height:36px;border-radius:50%;border:1px solid rgba(100,140,255,0.15);background:rgba(10,15,30,0.6);color:#94a3b8;font-size:10px;font-weight:600;cursor:pointer;transition:all .25s;display:flex;align-items:center;justify-content:center}
.nav-btn:hover{border-color:#3b82f6;color:#60a5fa;transform:scale(1.15);box-shadow:0 0 12px rgba(59,130,246,0.3)}
.nav-btn.active{background:rgba(59,130,246,0.35);color:#fff;border-color:#3b82f6}
#planet-hud{position:absolute;left:20px;top:50%;transform:translateY(-50%);padding:20px 24px;width:260px;opacity:0;transition:opacity .3s,transform .3s;transform:translateY(-50%) translateX(-10px)}
#planet-hud.visible{opacity:1;transform:translateY(-50%) translateX(0)}
#planet-hud h2{font-size:18px;font-weight:700;margin-bottom:4px;background:linear-gradient(135deg,#60a5fa,#c084fc);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
#planet-hud .subtitle{font-size:11px;color:#64748b;margin-bottom:14px;letter-spacing:1px;text-transform:uppercase}
.hud-row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid rgba(100,140,255,0.08)}
.hud-row:last-child{border-bottom:none}
.hud-label{font-size:11px;color:#64748b;font-weight:500}
.hud-value{font-family:'JetBrains Mono',monospace;font-size:12px;color:#e0e6f0}
#loading-screen{position:fixed;top:0;left:0;width:100%;height:100%;background:#050510;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;transition:opacity .8s}
#loading-screen.hidden{opacity:0;pointer-events:none}
.loader{width:48px;height:48px;border:3px solid rgba(59,130,246,0.15);border-top-color:#3b82f6;border-radius:50%;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#loading-screen p{margin-top:16px;font-size:13px;color:#64748b;letter-spacing:2px}
#help-hint{position:absolute;bottom:80px;left:50%;transform:translateX(-50%);font-size:11px;color:#475569;letter-spacing:1px;transition:opacity 1s}
</style>
</head>
<body>
<div id="loading-screen"><div class="loader"></div><p>INITIALIZING SOLAR SYSTEM</p></div>
<div id="ui-overlay">
  <div id="top-bar" class="glass">

  <div id="controls-panel" class="glass">

      <button class="btn" id="pause-btn">⏸ Pause</button>

  </div>
  <div id="planet-nav" class="glass">
    <button class="nav-btn" data-target="Sun" title="Sun">☉</button>
    <button class="nav-btn" data-target="Mercury" title="Mercury">Me</button>
    <button class="nav-btn" data-target="Venus" title="Venus">Ve</button>

    <button class="nav-btn" data-target="Mars" title="Mars">Ma</button>

    <button class="nav-btn" data-target="Saturn" title="Saturn">Sa</button>
    <button class="nav-btn" data-target="Uranus" title="Uranus">Ur</button>
    <button class="nav-btn" data-target="Neptune" title="Neptune">Ne</button>
  </div>
  <div id="planet-hud" class="glass">
    <h2 id="hud-name">Earth</h2>
    <div class="subtitle" id="hud-type">Terrestrial Planet</div>
    <div class="hud-row"><span class="hud-label">Distance from Sun</span><span class="hud-value" id="hud-dist">1.000 AU</span></div>
    <div class="hud-row"><span class="hud-label">Velocity</span><span class="hud-value" id="hud-vel">29.78 km/s</span></div>
    <div class="hud-row"><span class="hud-label">Orbital Period</span><span class="hud-value" id="hud-period">365.25 days</span></div>
    <div class="hud-row"><span class="hud-label">Mass</span><span class="hud-value" id="hud-mass">5.972e24 kg</span></div>
    <div class="hud-row"><span class="hud-label">Radius</span><span class="hud-value" id="hud-radius">6,371 km</span></div>
  </div>
  <div id="help-hint">Click a planet or use the navigation panel to explore • Scroll to zoom • Drag to orbit</div>
</div>

<script type="importmap">
{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js","three/addons/":"https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"}}

<script type="module">
import * as THREE from 'three';
import {OrbitControls} from 'three/addons/controls/OrbitControls.js';

/* ═══════════════════ CONSTANTS ═══════════════════ */
const G_ASTRO = 2.9591220828e-4; // AU³/(M☉·day²)
const AU_KM = 1.496e8;
const DAY_S = 86400;
const KMS_TO_AUD = DAY_S / AU_KM;

/* ═══════════════════ PLANET DATA (NASA JPL) ═══════════════════ */
const BODIES = [
  {name:'Sun',type:'Star',mass:1.0,radius_km:696340,color:0xfff2cc,
   pos:[0,0,0],vel:[0,0,0],orbitalPeriod:0,
   visualRadius:4.5,textureGen:'sun'},
  {name:'Mercury',type:'Terrestrial',mass:1.6601e-7,radius_km:2439.7,color:0xb0a89a,
   pos:[0.387,0,0],vel:[0,0.02735,0],orbitalPeriod:87.97,
   visualRadius:0.32,textureGen:'mercury'},
  {name:'Venus',type:'Terrestrial',mass:2.4478e-6,radius_km:6051.8,color:0xe8cda0,
   pos:[0.723,0,0],vel:[0,0.02022,0],orbitalPeriod:224.7,
   visualRadius:0.55,textureGen:'venus'},
  {name:'Earth',type:'Terrestrial',mass:3.0027e-6,radius_km:6371,color:0x6b93d6,
   pos:[1.0,0,0],vel:[0,0.01720,0],orbitalPeriod:365.25,
   visualRadius:0.58,textureGen:'earth'},
  {name:'Mars',type:'Terrestrial',mass:3.2272e-7,radius_km:3389.5,color:0xc1440e,
   pos:[1.524,0,0],vel:[0,0.01390,0],orbitalPeriod:687.0,
   visualRadius:0.42,textureGen:'mars'},
  {name:'Jupiter',type:'Gas Giant',mass:9.5479e-4,radius_km:69911,color:0xd4a574,
   pos:[5.203,0,0],vel:[0,0.007547,0],orbitalPeriod:4332.6,
   visualRadius:1.8,textureGen:'jupiter'},
  {name:'Saturn',type:'Gas Giant',mass:2.8588e-4,radius_km:58232,color:0xe8d5a3,
   pos:[9.537,0,0],vel:[0,0.005590,0],orbitalPeriod:10759,
   visualRadius:1.5,textureGen:'saturn',hasRings:true},
  {name:'Uranus',type:'Ice Giant',mass:4.366e-5,radius_km:25362,color:0xb8dce8,
   pos:[19.19,0,0],vel:[0,0.003927,0],orbitalPeriod:30688,
   visualRadius:0.9,textureGen:'uranus'},
  {name:'Neptune',type:'Ice Giant',mass:5.1514e-5,radius_km:24622,color:0x5b7fc3,
   pos:[30.07,0,0],vel:[0,0.003136,0],orbitalPeriod:60182,
   visualRadius:0.88,textureGen:'neptune'}
];

/* ═══════════════════ TEXTURE GENERATION ═══════════════════ */
function hash(x,y){let n=Math.sin(x*127.1+y*311.7)*43758.5453;return n-Math.floor(n)}
function noise2D(px,py){
  const ix=Math.floor(px),iy=Math.floor(py),fx=px-ix,fy=py-iy;
  const sx=fx*fx*(3-2*fx),sy=fy*fy*(3-2*fy);
  const a=hash(ix,iy),b=hash(ix+1,iy),c=hash(ix,iy+1),d=hash(ix+1,iy+1);
  return a+(b-a)*sx+(c-a)*sy+(d-c-b+a)*sx*sy;
}
function fbm(x,y,oct=6){let v=0,a=0.5,f=1;for(let i=0;i<oct;i++){v+=a*noise2D(x*f,y*f);f*=2.0;a*=0.5}return v}
function lerp(a,b,t){return a+(b-a)*t}
function clamp(v,lo=0,hi=1){return Math.max(lo,Math.min(hi,v))}

function genTexture(type,w=1024,h=512){
  const c=document.createElement('canvas');c.width=w;c.height=h;
  const ctx=c.getContext('2d');
  const id=ctx.createImageData(w,h);const d=id.data;
  const gen={
    sun(){
      for(let y=0;y<h;y++)for(let x=0;x<w;x++){
        const i=(y*w+x)*4;
        const n1=fbm(x/120+0.5,y/120+0.5,5);
        const n2=fbm(x/40+10,y/40+10,4)*0.3;
        const bright=clamp(0.7+n1*0.4+n2);
        d[i]=255;d[i+1]=Math.min(255,(200+bright*55)|0);d[i+2]=Math.min(255,(50+bright*80)|0);d[i+3]=255;
      }
      ctx.putImageData(id,0,0);
    },
    mercury(){
      for(let y=0;y<h;y++)for(let x=0;x<w;x++){
        const i=(y*w+x)*4;
        const n=fbm(x/60+3,y/60+3,6);
        const base=clamp(0.25+n*0.45);
        const crater=fbm(x/20+50,y/20+50,4);
        const c2=crater>0.6?base*0.7:base;
        const v=(c2*180)|0;
        d[i]=v+10;d[i+1]=v+5;d[i+2]=v;d[i+3]=255;
      }
      ctx.putImageData(id,0,0);
    },
    venus(){
      for(let y=0;y<h;y++)for(let x=0;x<w;x++){
        const i=(y*w+x)*4;
        const n1=fbm(x/100+7,y/80+7,5);
        const n2=fbm(x/40+20,y/50+20,4)*0.3;
        const v=clamp(0.5+n1*0.4+n2);
        d[i]=(180+v*60)|0;d[i+1]=(140+v*50)|0;d[i+2]=(60+v*40)|0;d[i+3]=255;
      }
      ctx.putImageData(id,0,0);
    },
    earth(){
      for(let y=0;y<h;y++)for(let x=0;x<w;x++){
        const i=(y*w+x)*4;
        const lat=(y/h-0.5)*Math.PI;
        const lon=(x/w)*Math.PI*2;
        const n=fbm(lon*2+1,lat*4+1,6);
        const land=n>0.48;
        const polar=Math.abs(lat)>1.25;
        if(polar){
          const snow=clamp((Math.abs(lat)-1.25)*4);
          d[i]=(220+snow*35)|0;d[i+1]=(225+snow*30)|0;d[i+2]=(235+snow*20)|0;
        } else if(land){
          const elev=clamp((n-0.48)*5);
          const desert=fbm(lon*3+10,lat*5+10,3)>0.55;
          if(desert){d[i]=(160+elev*40)|0;d[i+1]=(140+elev*30)|0;d[i+2]=(90+elev*20)|0;}
          else{d[i]=(40+elev*50)|0;d[i+1]=(90+elev*60)|0;d[i+2]=(30+elev*30)|0;}
        } else {
          const depth=clamp((0.48-n)*3);
          d[i]=(15+depth*20)|0;d[i+1]=(40+depth*60)|0;d[i+2]=(120+depth*60)|0;
        }
        const cloud=fbm(lon*3+50,lat*3+50,4);
        if(cloud>0.55){
          const ca=clamp((cloud-0.55)*5)*0.7;
          d[i]=lerp(d[i],245,ca)|0;d[i+1]=lerp(d[i+1],248,ca)|0;d[i+2]=lerp(d[i+2],255,ca)|0;
        }
        d[i+3]=255;
      }
      ctx.putImageData(id,0,0);
    },
    mars(){
      for(let y=0;y<h;y++)for(let x=0;x<w;x++){
        const i=(y*w+x)*4;
        const lat=(y/h-0.5)*Math.PI;
        const n=fbm(x/70+5,y/70+5,6);
        const dark=fbm(x/120+30,y/100+30,4);
        const base=clamp(0.4+n*0.5);
        const polar=Math.abs(lat)>1.35?clamp((Math.abs(lat)-1.35)*6):0;
        const isDark=dark>0.55;
        let r,g,b;
        if(polar>0){r=lerp(180,230,polar)|0;g=lerp(100,220,polar)|0;b=lerp(60,210,polar)|0;}
        else if(isDark){r=(120+base*40)|0;g=(60+base*25)|0;b=(40+base*15)|0;}
        else{r=(180+base*50)|0;g=(100+base*30)|0;b=(50+base*20)|0;}
        d[i]=r;d[i+1]=g;d[i+2]=b;d[i+3]=255;
      }
      ctx.putImageData(id,0,0);
    },
    jupiter(){
      for(let y=0;y<h;y++)for(let x=0;x<w;x++){
        const i=(y*w+x)*4;
        const t=y/h;
        const warp=fbm(x/200+1,y/30+1,4)*0.03;
        const band=Math.sin((t+warp)*Math.PI*12);
        const n=fbm(x/80+2,y/160+2,5)*0.2;
        const v=clamp(0.5+band*0.3+n);
        // Realistic Jupiter palette: cream, tan, rust-brown, ochre
        const zones=[
          [235,220,190],[210,180,140],[180,130,90],[220,195,160],[200,160,120],
          [230,210,175],[190,145,100],[215,190,155],[195,155,110],[225,205,170]
        ];
        const zi=Math.floor(t*zones.length)%zones.length;
        const zn=(zi+1)%zones.length;
        const zt=(t*zones.length)%1;
        let r=lerp(zones[zi][0],zones[zn][0],zt);let g=lerp(zones[zi][1],zones[zn][1],zt);let b=lerp(zones[zi][2],zones[zn][2],zt);
        r=clamp((r+v*30-15)/255)*255;g=clamp((g+v*25-12)/255)*255;b=clamp((b+v*20-10)/255)*255;
        // Great Red Spot
        const dx=(x/w-0.6)*2,dy=(t-0.58)*6;
        const spotDist=dx*dx*1.5+dy*dy;
        if(spotDist<0.08){
          const si=clamp(1-spotDist/0.08);
          r=lerp(r,190,si*0.8);g=lerp(g,90,si*0.8);b=lerp(b,60,si*0.8);
        }
        d[i]=r|0;d[i+1]=g|0;d[i+2]=b|0;d[i+3]=255;
      }
      ctx.putImageData(id,0,0);
    },
    saturn(){
      for(let y=0;y<h;y++)for(let x=0;x<w;x++){
        const i=(y*w+x)*4;
        const t=y/h;
        const warp=fbm(x/250+3,y/40+3,3)*0.02;
        const band=Math.sin((t+warp)*Math.PI*10)*0.15;
        const n=fbm(x/100+5,y/200+5,4)*0.1;
        const v=clamp(0.5+band+n);
        // Muted gold/tan/cream Saturn palette
        d[i]=(195+v*40)|0;d[i+1]=(175+v*35)|0;d[i+2]=(130+v*30)|0;d[i+3]=255;
      }
      ctx.putImageData(id,0,0);
    },
    uranus(){
      for(let y=0;y<h;y++)for(let x=0;x<w;x++){
        const i=(y*w+x)*4;
        const t=y/h;
        const n=fbm(x/150+8,y/150+8,4)*0.08;
        const band=Math.sin(t*Math.PI*6)*0.03;
        const v=clamp(0.5+n+band);
        // Pale cyan-teal (Voyager 2 true color)
        d[i]=(160+v*30)|0;d[i+1]=(210+v*25)|0;d[i+2]=(220+v*20)|0;d[i+3]=255;
      }
      ctx.putImageData(id,0,0);
    },
    neptune(){
      for(let y=0;y<h;y++)for(let x=0;x<w;x++){
        const i=(y*w+x)*4;
        const t=y/h;
        const n=fbm(x/100+12,y/100+12,5)*0.15;
        const band=Math.sin(t*Math.PI*8)*0.08;
        const v=clamp(0.5+n+band);
        // Deep vivid blue (Voyager 2)
        d[i]=(50+v*30)|0;d[i+1]=(80+v*40)|0;d[i+2]=(180+v*50)|0;
        // Faint bright storm spots
        const spot=fbm(x/30+100,y/30+100,3);
        if(spot>0.72){
          const sa=clamp((spot-0.72)*8)*0.3;
          d[i]=lerp(d[i],200,sa)|0;d[i+1]=lerp(d[i+1],220,sa)|0;d[i+2]=lerp(d[i+2],255,sa)|0;
        }
        d[i+3]=255;
      }
      ctx.putImageData(id,0,0);
    }
  };
  if(gen[type])gen[type]();
  const tex=new THREE.CanvasTexture(c);tex.colorSpace=THREE.SRGBColorSpace;return tex;
}

function genRingTexture(){
  const c=document.createElement('canvas');c.width=1024;c.height=64;
  const ctx=c.getContext('2d');
  for(let x=0;x<1024;x++){const t=x/1024;
    // Realistic Saturn ring structure: C ring (dark), B ring (bright), Cassini division, A ring
    let a=0,r=180,g=165,b=140;
    if(t<0.12){a=0;} // inner gap
    else if(t<0.28){a=clamp((t-0.12)*8)*0.35;r=140;g=125;b=105;} // C ring (faint)
    else if(t<0.58){a=0.55+Math.sin(t*80)*0.15;r=200;g=185;b=155;} // B ring (bright)
    else if(t<0.63){a=0.05;} // Cassini Division
    else if(t<0.85){a=0.4+Math.sin(t*60)*0.1;r=190;g=175;b=148;} // A ring
    else if(t<0.88){a=0.08;} // Encke gap
    else{a=clamp((0.95-t)*8)*0.2;r=170;g=155;b=135;} // F ring (faint)
    ctx.fillStyle=`rgba(${r},${g},${b},${clamp(a)})`;ctx.fillRect(x,0,1,64)}
  const tex=new THREE.CanvasTexture(c);tex.colorSpace=THREE.SRGBColorSpace;return tex;
}

/* ═══════════════════ THREE.JS SETUP ═══════════════════ */
const renderer=new THREE.WebGLRenderer({antialias:true,powerPreference:'high-performance'});
renderer.setSize(window.innerWidth,window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
renderer.shadowMap.enabled=true;
renderer.toneMapping=THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure=1.2;
document.body.prepend(renderer.domElement);

const scene=new THREE.Scene();
const camera=new THREE.PerspectiveCamera(55,window.innerWidth/window.innerHeight,0.001,500000);
camera.position.set(20,15,25);

const controls=new OrbitControls(camera,renderer.domElement);
controls.enableDamping=true;controls.dampingFactor=0.06;
controls.minDistance=0.1;controls.maxDistance=50000;
controls.zoomSpeed=1.5;

/* ═══════════════════ STARFIELD ═══════════════════ */
(function createStarfield(){
  const geo=new THREE.BufferGeometry();
  const n=12000;const pos=new Float32Array(n*3),col=new Float32Array(n*3),sizes=new Float32Array(n);
  for(let i=0;i<n;i++){
    const theta=Math.random()*Math.PI*2,phi=Math.acos(2*Math.random()-1),r=800+Math.random()*4000;
    pos[i*3]=r*Math.sin(phi)*Math.cos(theta);pos[i*3+1]=r*Math.sin(phi)*Math.sin(theta);pos[i*3+2]=r*Math.cos(phi);
    const temp=Math.random();
    col[i*3]=0.8+temp*0.2;col[i*3+1]=0.8+temp*0.15;col[i*3+2]=0.9+temp*0.1;
    sizes[i]=0.5+Math.random()*2;
  }
  geo.setAttribute('position',new THREE.BufferAttribute(pos,3));
  geo.setAttribute('color',new THREE.BufferAttribute(col,3));
  geo.setAttribute('size',new THREE.BufferAttribute(sizes,1));
  const mat=new THREE.PointsMaterial({size:1.5,vertexColors:true,transparent:true,opacity:0.85,sizeAttenuation:true});
  scene.add(new THREE.Points(geo,mat));
})();

/* ═══════════════════ LIGHTING ═══════════════════ */
const ambientLight=new THREE.AmbientLight(0x111122,0.15);scene.add(ambientLight);
const sunLight=new THREE.PointLight(0xfff5e0,2.5,0,1.5);sunLight.castShadow=true;
sunLight.shadow.mapSize.set(1024,1024);scene.add(sunLight);

/* ═══════════════════ BUILD SOLAR SYSTEM ═══════════════════ */
let visualMode=true;
const celestialObjects=[];
const orbitLines=[];
const AU_SCALE_TRUE=100;

function visualDist(au){return 12*Math.pow(au,0.42)+2}
function trueDist(au){return au*AU_SCALE_TRUE}
function getDisplayPos(realPos){
  const r=Math.sqrt(realPos[0]**2+realPos[1]**2+realPos[2]**2);
  if(r<1e-10)return new THREE.Vector3(0,0,0);
  const s=visualMode?visualDist(r)/r:trueDist(r)/r;
  return new THREE.Vector3(realPos[0]*s,realPos[1]*s,realPos[2]*s);
}

function getVisualSize(body){
  if(visualMode)return body.visualRadius;
  return Math.max(body.radius_km/AU_KM*AU_SCALE_TRUE,0.05);
}

BODIES.forEach((body,i)=>{
  const size=getVisualSize(body);
  const geo=new THREE.SphereGeometry(size,48,32);
  let mat;
  if(i===0){
    mat=new THREE.MeshBasicMaterial({map:genTexture(body.textureGen),color:0xffffff});
  } else {
    mat=new THREE.MeshStandardMaterial({map:genTexture(body.textureGen),roughness:0.8,metalness:0.1});
  }
  const mesh=new THREE.Mesh(geo,mat);
  mesh.castShadow=i>0;mesh.receiveShadow=i>0;
  mesh.userData={bodyIndex:i,name:body.name};
  scene.add(mesh);

  let ringMesh=null;
  if(body.hasRings){
    const rGeo=new THREE.RingGeometry(size*1.4,size*2.5,64);
    const rMat=new THREE.MeshStandardMaterial({map:genRingTexture(),side:THREE.DoubleSide,transparent:true,opacity:0.8,roughness:0.9});
    ringMesh=new THREE.Mesh(rGeo,rMat);
    ringMesh.rotation.x=Math.PI/2.2;
    mesh.add(ringMesh);
  }

  // Sun glow
  if(i===0){
    const spriteMat=new THREE.SpriteMaterial({
      map:(() => {const c=document.createElement('canvas');c.width=256;c.height=256;
        const ctx=c.getContext('2d');const g=ctx.createRadialGradient(128,128,0,128,128,128);
        g.addColorStop(0,'rgba(255,240,180,0.6)');g.addColorStop(0.3,'rgba(255,200,80,0.2)');
        g.addColorStop(1,'rgba(255,150,30,0)');ctx.fillStyle=g;ctx.fillRect(0,0,256,256);
        const t=new THREE.CanvasTexture(c);t.colorSpace=THREE.SRGBColorSpace;return t})(),
      blending:THREE.AdditiveBlending,transparent:true,depthWrite:false
    });
    const sprite=new THREE.Sprite(spriteMat);sprite.scale.set(18,18,1);mesh.add(sprite);
  }

  // Orbit line (skip Sun)
  if(i>0){
    const sma=Math.sqrt(body.pos[0]**2+body.pos[1]**2+body.pos[2]**2);
    const pts=[];const seg=128;
    for(let j=0;j<=seg;j++){
      const angle=(j/seg)*Math.PI*2;
      const ox=Math.cos(angle)*sma,oz=Math.sin(angle)*sma;
      const dp=getDisplayPos([ox,0,oz]);pts.push(dp);
    }
    const lineGeo=new THREE.BufferGeometry().setFromPoints(pts);
    const lineMat=new THREE.LineBasicMaterial({color:body.color,transparent:true,opacity:0.2});
    const line=new THREE.LineLoop(lineGeo,lineMat);
    scene.add(line);
    orbitLines.push({line,sma,color:body.color});
  }

  // Label sprite
  const labelSprite=(()=>{
    const c=document.createElement('canvas');c.width=256;c.height=64;
    const ctx=c.getContext('2d');ctx.font='bold 28px Inter, sans-serif';ctx.fillStyle='rgba(200,215,240,0.85)';
    ctx.textAlign='center';ctx.fillText(body.name,128,40);
    const t=new THREE.CanvasTexture(c);t.colorSpace=THREE.SRGBColorSpace;
    const sm=new THREE.SpriteMaterial({map:t,transparent:true,depthWrite:false});
    const s=new THREE.Sprite(sm);s.scale.set(4,1,1);
    scene.add(s);return s;
  })();

  celestialObjects.push({
    mesh, ringMesh, labelSprite, body,
    pos:[...body.pos], vel:[...body.vel], acc:[0,0,0]
  });
});

/* ═══════════════════ PHYSICS ENGINE (Velocity Verlet) ═══════════════════ */
function computeAccelerations(objects){
  for(let i=0;i<objects.length;i++){objects[i].acc=[0,0,0]}
  for(let i=0;i<objects.length;i++){
    for(let j=i+1;j<objects.length;j++){
      const dx=objects[j].pos[0]-objects[i].pos[0];
      const dy=objects[j].pos[1]-objects[i].pos[1];
      const dz=objects[j].pos[2]-objects[i].pos[2];
      const r2=dx*dx+dy*dy+dz*dz;
      const r=Math.sqrt(r2);
      const softening=1e-10;
      const f=G_ASTRO/(r2+softening)/r;
      const mj=objects[j].body.mass, mi=objects[i].body.mass;
      objects[i].acc[0]+=f*mj*dx;objects[i].acc[1]+=f*mj*dy;objects[i].acc[2]+=f*mj*dz;
      objects[j].acc[0]-=f*mi*dx;objects[j].acc[1]-=f*mi*dy;objects[j].acc[2]-=f*mi*dz;
    }
  }
}

function stepVerlet(objects,dt){
  // Step 1: Update positions
  for(let i=0;i<objects.length;i++){
    const o=objects[i];
    o.pos[0]+=o.vel[0]*dt+0.5*o.acc[0]*dt*dt;
    o.pos[1]+=o.vel[1]*dt+0.5*o.acc[1]*dt*dt;
    o.pos[2]+=o.vel[2]*dt+0.5*o.acc[2]*dt*dt;
  }
  // Step 2: Save old accelerations, compute new
  const oldAcc=objects.map(o=>[...o.acc]);
  computeAccelerations(objects);
  // Step 3: Update velocities
  for(let i=0;i<objects.length;i++){
    const o=objects[i];
    o.vel[0]+=0.5*(oldAcc[i][0]+o.acc[0])*dt;
    o.vel[1]+=0.5*(oldAcc[i][1]+o.acc[1])*dt;
    o.vel[2]+=0.5*(oldAcc[i][2]+o.acc[2])*dt;
  }
}
computeAccelerations(celestialObjects); // initial accelerations

/* ═══════════════════ RAYCASTING ═══════════════════ */
const raycaster=new THREE.Raycaster();
raycaster.params.Points={threshold:0.5};
const mouse=new THREE.Vector2();
let selectedPlanet=null;
let targetPlanet=null;

renderer.domElement.addEventListener('click',(e)=>{
  mouse.x=(e.clientX/window.innerWidth)*2-1;
  mouse.y=-(e.clientY/window.innerHeight)*2+1;
  raycaster.setFromCamera(mouse,camera);
  const meshes=celestialObjects.map(o=>o.mesh);
  const hits=raycaster.intersectObjects(meshes);
  if(hits.length>0){
    const idx=hits[0].object.userData.bodyIndex;
    selectPlanet(idx);
  }
});

function selectPlanet(idx){
  selectedPlanet=idx;
  targetPlanet=idx;
  updateHUD(idx);
  document.getElementById('planet-hud').classList.add('visible');
  document.querySelectorAll('.nav-btn').forEach((b,i)=>b.classList.toggle('active',i===idx));
}

function updateHUD(idx){
  const o=celestialObjects[idx];
  const dist=Math.sqrt(o.pos[0]**2+o.pos[1]**2+o.pos[2]**2);
  const velAU=Math.sqrt(o.vel[0]**2+o.vel[1]**2+o.vel[2]**2);
  const velKMS=velAU/KMS_TO_AUD;
  document.getElementById('hud-name').textContent=o.body.name;
  document.getElementById('hud-type').textContent=o.body.type;
  document.getElementById('hud-dist').textContent=dist.toFixed(4)+' AU';
  document.getElementById('hud-vel').textContent=velKMS.toFixed(2)+' km/s';
  document.getElementById('hud-period').textContent=o.body.orbitalPeriod>0?(o.body.orbitalPeriod.toFixed(1)+' days'):'N/A';
  document.getElementById('hud-mass').textContent=(o.body.mass===1?'1.989e30':(o.body.mass*1.989e30).toExponential(3))+' kg';
  document.getElementById('hud-radius').textContent=o.body.radius_km.toLocaleString()+' km';
}

/* ═══════════════════ UI CONTROLS ═══════════════════ */
let timeScale=10; // days per second
let paused=false;
let simDays=0;

const timeSlider=document.getElementById('time-slider');
const timeVal=document.getElementById('time-val');
const pauseBtn=document.getElementById('pause-btn');
const scaleBtn=document.getElementById('scale-btn');

timeSlider.addEventListener('input',()=>{
  timeScale=Math.pow(10,parseFloat(timeSlider.value));
  updateTimeLabel();
});

function updateTimeLabel(){
  if(timeScale<1)timeVal.textContent=timeScale.toFixed(2)+' d/s';
  else if(timeScale<365)timeVal.textContent=timeScale.toFixed(1)+' d/s';
  else timeVal.textContent=(timeScale/365.25).toFixed(1)+' yr/s';
}
updateTimeLabel();

pauseBtn.addEventListener('click',()=>{
  paused=!paused;
  pauseBtn.textContent=paused?'▶ Play':'⏸ Pause';
  pauseBtn.classList.toggle('active',paused);
});

scaleBtn.addEventListener('click',()=>{
  visualMode=!visualMode;
  scaleBtn.textContent=visualMode?'Visual Mode':'True Scale';
  scaleBtn.classList.toggle('active',!visualMode);
  rebuildOrbits();
  updateAllPositions();
  // Reposition camera to a sensible distance for the new scale mode
  if(targetPlanet!==null){
    const tp=celestialObjects[targetPlanet].mesh.position;
    const sz=getVisualSize(celestialObjects[targetPlanet].body);
    const dist=Math.max(sz*5,visualMode?30:200);
    camera.position.set(tp.x+dist*0.6,tp.y+dist*0.4,tp.z+dist*0.6);
    controls.target.copy(tp);
  } else {
    if(!visualMode){camera.position.set(800,600,800);controls.target.set(0,0,0);}
    else{camera.position.set(20,15,25);controls.target.set(0,0,0);}
  }
  controls.update();
});

function rebuildOrbits(){
  orbitLines.forEach((ol,i)=>{
    const pts=[];const seg=128;
    for(let j=0;j<=seg;j++){
      const angle=(j/seg)*Math.PI*2;
      const ox=Math.cos(angle)*ol.sma,oz=Math.sin(angle)*ol.sma;
      pts.push(getDisplayPos([ox,0,oz]));
    }
    ol.line.geometry.dispose();
    ol.line.geometry=new THREE.BufferGeometry().setFromPoints(pts);
  });
}

function updateAllPositions(){
  celestialObjects.forEach((o,i)=>{
    const dp=getDisplayPos(o.pos);
    o.mesh.position.copy(dp);
    const sz=getVisualSize(o.body);
    o.mesh.scale.setScalar(sz/o.body.visualRadius||1);
    o.labelSprite.position.set(dp.x,dp.y+sz+1.5,dp.z);
    if(i===0)sunLight.position.copy(dp);
  });
}

document.querySelectorAll('.nav-btn').forEach((btn,i)=>{
  btn.addEventListener('click',()=>selectPlanet(i));
});

document.addEventListener('keydown',(e)=>{
  if(e.key===' '){paused=!paused;pauseBtn.textContent=paused?'▶ Play':'⏸ Pause';pauseBtn.classList.toggle('active',paused)}
  if(e.key==='v'||e.key==='V'){scaleBtn.click()}
  const num=parseInt(e.key);if(!isNaN(num)&&num>=0&&num<=8)selectPlanet(num);
});

/* ═══════════════════ ANIMATION LOOP ═══════════════════ */
let lastTime=performance.now();
const clock=new THREE.Clock();
const camLerpSpeed=2.5;

function animate(now){
  requestAnimationFrame(animate);
  const frameDt=Math.min((now-lastTime)/1000,0.1);
  lastTime=now;

  if(!paused){
    const simDt=timeScale*frameDt;
    // Sub-step for stability at high time scales
    const maxStep=1.0;
    let remaining=simDt;
    while(remaining>0){
      const step=Math.min(remaining,maxStep);
      stepVerlet(celestialObjects,step);
      remaining-=step;
    }
    simDays+=simDt;
    document.getElementById('sim-date').textContent=`J2000 + ${simDays.toFixed(1)} days (${(simDays/365.25).toFixed(2)} yr)`;
  }

  // Update display positions
  celestialObjects.forEach((o,i)=>{
    const dp=getDisplayPos(o.pos);
    o.mesh.position.copy(dp);
    const sz=getVisualSize(o.body);
    if(i===0){
      o.mesh.scale.setScalar(1);
      sunLight.position.copy(dp);
    }
    o.labelSprite.position.set(dp.x,dp.y+sz+1.5,dp.z);
    o.labelSprite.scale.set(Math.max(2,sz*1.5),Math.max(0.5,sz*0.4),1);
    o.mesh.rotation.y+=frameDt*0.15*(i===0?0.05:1);
  });

  // Camera follow target
  if(targetPlanet!==null){
    const tp=celestialObjects[targetPlanet].mesh.position;
    controls.target.lerp(tp,camLerpSpeed*frameDt);
  }

  // Update HUD in real-time
  if(selectedPlanet!==null)updateHUD(selectedPlanet);

  controls.update();
  renderer.render(scene,camera);
}

window.addEventListener('resize',()=>{
  camera.aspect=window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth,window.innerHeight);
});

// Start
setTimeout(()=>{
  document.getElementById('loading-screen').classList.add('hidden');
  document.getElementById('help-hint');
  setTimeout(()=>{const h=document.getElementById('help-hint');if(h)h.style.opacity='0'},8000);
},800);
requestAnimationFrame(animate);
</script>
</body>
</html>
